name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
jobs:
  build:
    runs-on: tenki-standard-medium-4c-8g
    steps:
      - uses: actions/checkout@v4
      - name: Run a one-line script
        run: echo Hello, world!
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.

  install:
    runs-on: tenki-standard-medium-4c-8g
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci || npm install

  lint:
    runs-on: tenki-standard-medium-4c-8g
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      - run: npm ci || npm install
      - name: Check JS syntax
        run: |
          node --check server.js
          node --check db.js
          node --check public/app.js

  smoke-test:
    runs-on: tenki-standard-medium-4c-8g
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      - run: npm ci || npm install
      - name: Start server and hit endpoints
        run: |
          PORT=3000 node server.js &
          SERVER_PID=$!
          sleep 3
          curl -fsS http://localhost:3000/api/books > /dev/null
          curl -fsS http://localhost:3000/api/genres > /dev/null
          curl -fsS http://localhost:3000/api/books/1 > /dev/null
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/books/99999)
          test "$code" = "404"
          kill $SERVER_PID

  audit:
    runs-on: tenki-standard-medium-4c-8g
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm install --package-lock-only
      - name: Run npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

  secret-scan:
    runs-on: tenki-standard-medium-4c-8g
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for committed secrets
        run: |
          if git grep -nE '(AKIA[0-9A-Z]{16}|-----BEGIN (RSA|OPENSSH) PRIVATE KEY-----|ghp_[A-Za-z0-9]{36})' -- ':!.github/workflows/*'; then
            echo "Potential secret detected"; exit 1
          fi

  check-gitignore:
    runs-on: tenki-standard-medium-4c-8g
    steps:
      - uses: actions/checkout@v4
      - name: Ensure books.db is not committed
        run: |
          if git ls-files | grep -E '(^|/)books\.db$'; then
            echo "books.db should be gitignored, not committed"; exit 1
          fi
          grep -q '^books.db$' .gitignore
          grep -q '^node_modules' .gitignore